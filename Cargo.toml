[package]
name = "cachereg"
version = "0.1.0"
authors = ["Georg Brandl <g.brandl@fz-juelich.de>"]
description = "Registrator for the NICOS cache."
edition = "2018"

[profile.release]
lto = true
debug = false

[dependencies]
log = "0.4.8"
systemd = "0.4.0"
structopt = "0.3.0"
interfaces = "0.0.4"
mlzutil = { version = "0.1.1", features = ["interfaces"] }
